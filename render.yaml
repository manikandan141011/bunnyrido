services:
  # Backend API
  - type: web
    name: bunnyrido-backend
    env: python
    region: singapore
    plan: free
    buildCommand: "pip install -r requirements.txt && python backend/manage.py migrate && python backend/manage.py collectstatic --no-input"
    startCommand: "gunicorn --chdir backend config.wsgi:application"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: bunnyrido-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: "*" # Update this to your backend URL once deployed
      - key: CORS_ALLOWED_ORIGINS
        value: "https://bunnyrido-frontend.onrender.com" # Update this to your frontend URL

  # Frontend Static Site
  - type: static
    name: bunnyrido-frontend
    env: static
    region: singapore
    plan: free
    buildCommand: "npm install && npm run build"
    staticPublishDir: "dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://bunnyrido-backend.onrender.com/api" # Update this to your backend URL

databases:
  - name: bunnyrido-db
    region: singapore
    plan: free
